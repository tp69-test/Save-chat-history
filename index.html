<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trích Xuất Lịch Sử Chat AI</title>
    <!-- Tailwind CSS cho Giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện JSZip để nén file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981; /* Đổi màu xanh lá */
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                AI Chat Extractor Pro
            </h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col gap-4">
        
        <div class="bg-amber-50 border-l-4 border-amber-500 p-3 rounded-r-lg shadow-sm text-sm text-amber-800">
            <b>Lưu ý:</b> Tool hiện tại được tối ưu để bóc tách text từ các link chia sẻ của <b>ChatGPT</b> (chatgpt.com/share/...). Dán link vào bên dưới.
        </div>

        <!-- Input Area -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <label for="linksInput" class="block text-sm font-semibold text-gray-700 mb-2">Nhập link (Mỗi dòng 1 link):</label>
            <textarea id="linksInput" rows="5" 
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-sm font-mono"
                placeholder="https://chatgpt.com/share/69b8cc73-392c-8010-93fe-8938d763aa10"></textarea>
            
            <button id="processBtn" onclick="processLinks()" 
                class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center">
                <span>Bắt đầu Quét Nội Dung</span>
            </button>
        </div>

        <!-- Trạng thái xử lý -->
        <div id="statusArea" class="hidden flex flex-col gap-2">
            <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider">Tiến trình quét</h2>
            <div id="logList" class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 max-h-48 overflow-y-auto text-sm flex flex-col gap-2">
                <!-- Logs xuất hiện ở đây -->
            </div>
        </div>

        <!-- Download Actions -->
        <div id="downloadArea" class="hidden bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col gap-3">
            <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider mb-1">Thành công! Chọn cách tải:</h2>
            
            <button onclick="downloadZip()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                </svg>
                Tải về tất cả (.ZIP)
            </button>

            <button onclick="downloadIndividualFiles()" class="w-full bg-white hover:bg-gray-50 active:bg-gray-100 text-gray-700 font-semibold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 border border-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Tải từng file (.TXT)
            </button>
        </div>

    </main>

    <script>
        let extractedChats = [];

        async function processLinks() {
            const input = document.getElementById('linksInput').value;
            const processBtn = document.getElementById('processBtn');
            const statusArea = document.getElementById('statusArea');
            const logList = document.getElementById('logList');
            const downloadArea = document.getElementById('downloadArea');

            const links = input.split('\n').map(link => link.trim()).filter(link => link.startsWith('http'));

            if (links.length === 0) {
                alert("Vui lòng nhập ít nhất 1 đường link hợp lệ (bắt đầu bằng http)!");
                return;
            }

            extractedChats = [];
            logList.innerHTML = '';
            statusArea.classList.remove('hidden');
            downloadArea.classList.add('hidden');
            processBtn.innerHTML = '<span class="loader"></span> Đang quét...';
            processBtn.disabled = true;
            processBtn.classList.add('opacity-70');

            for (let i = 0; i < links.length; i++) {
                const url = links[i];
                const logItem = document.createElement('div');
                logItem.className = 'flex items-center text-gray-600 gap-2 border-b border-gray-100 pb-1 last:border-0';
                logItem.innerHTML = `<span class="loader" style="width:14px;height:14px;border-width:2px;"></span> Đang đọc: <span class="truncate max-w-[200px] text-xs">${url}</span>`;
                logList.appendChild(logItem);
                logList.scrollTop = logList.scrollHeight;

                try {
                    // Gọi hàm cào dữ liệu THẬT SỰ
                    const textData = await scrapeChatData(url);
                    
                    extractedChats.push({
                        filename: `Chat_${i+1}_${getDomainStr(url)}.txt`,
                        content: textData
                    });

                    logItem.innerHTML = `<svg class="w-4 h-4 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span class="text-emerald-600 font-medium text-xs">Thành công</span>`;
                } catch (error) {
                    let errMsg = error.message.includes('403') ? 'Bị chặn bởi bảo mật' : 'Lỗi không xác định';
                    logItem.innerHTML = `<svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> <span class="text-red-600 font-medium text-xs">Lỗi (${errMsg})</span>`;
                    
                    // Vẫn tạo file nhưng ghi chú là lỗi
                    extractedChats.push({
                        filename: `Chat_${i+1}_ERROR.txt`,
                        content: `Không thể tải link: ${url}\nLý do: Trang web chặn quyền truy cập hoặc link không tồn tại.\nChi tiết kỹ thuật: ${error.message}`
                    });
                }
            }

            processBtn.innerHTML = 'Bắt đầu Quét Nội Dung';
            processBtn.disabled = false;
            processBtn.classList.remove('opacity-70');

            if (extractedChats.length > 0) {
                downloadArea.classList.remove('hidden');
                setTimeout(() => downloadArea.scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
            }
        }

        // HÀM CÀO DỮ LIỆU THẬT
        async function scrapeChatData(url) {
            // Sử dụng Proxy của AllOrigins để vượt qua lỗi CORS
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Proxy lỗi phản hồi mạng');
            
            const data = await response.json();
            const htmlString = data.contents; // Đây là toàn bộ mã HTML của trang web chat

            if (!htmlString || htmlString.trim() === '') {
                throw new Error("Không nhận được nội dung HTML");
            }

            // Chuyển HTML string thành cây DOM để dễ tìm kiếm thẻ
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');

            let parsedText = `[THÔNG TIN TRÍCH XUẤT]\n- Nguồn: ${url}\n- Ngày lưu: ${new Date().toLocaleString('vi-VN')}\n`;
            parsedText += `====================================================\n\n`;

            // BÓC TÁCH CHO CHATGPT (Tìm các thẻ có thuộc tính data-message-author-role)
            if (url.includes('chatgpt.com')) {
                const messageNodes = doc.querySelectorAll('[data-message-author-role]');
                
                if (messageNodes.length === 0) {
                    // Nếu không tìm thấy thẻ, có thể do Cloudflare chặn hoặc React chưa render
                    // Fallback: Tìm thẻ <script> chứa dữ liệu JSON khởi tạo của trang
                    const scriptTag = doc.querySelector('script#__NEXT_DATA__');
                    if (scriptTag) {
                        parsedText += "(Nội dung được trích xuất từ raw data do web ẩn giao diện)\n\n";
                        try {
                            const jsonData = JSON.parse(scriptTag.textContent);
                            // Cấu trúc JSON của ChatGPT share khá sâu, cố gắng bóc tách nội dung
                            const linearThread = jsonData?.props?.pageProps?.serverResponse?.data?.linear_conversation;
                            if (linearThread) {
                                linearThread.forEach(msg => {
                                    if(msg?.message?.content?.parts) {
                                        const role = msg.message.author.role === 'user' ? 'Người dùng' : 'ChatGPT';
                                        const text = msg.message.content.parts.join('\n');
                                        parsedText += `[${role.toUpperCase()}]\n${text}\n\n------------------------\n\n`;
                                    }
                                });
                                return parsedText;
                            }
                        } catch(e) {}
                    }
                    return parsedText + "⚠️ Không thể phân tích được chữ. Do hệ thống bảo mật Cloudflare của ChatGPT đã chặn Proxy lấy nội dung, hoặc cấu trúc trang vừa thay đổi.";
                }

                // Nếu lấy được DOM bình thường
                messageNodes.forEach(node => {
                    const role = node.getAttribute('data-message-author-role');
                    const textContent = node.textContent.trim();
                    const roleName = role === 'user' ? 'NGƯỜI DÙNG' : 'CHATGPT';
                    
                    parsedText += `[${roleName}]\n${textContent}\n\n`;
                    parsedText += `----------------------------------------------------\n\n`;
                });

                return parsedText;
            } 
            // Nếu link không phải ChatGPT
            else {
                // Thử lấy toàn bộ text trong thẻ body
                const bodyText = doc.body.innerText || doc.body.textContent;
                return parsedText + "CẢNH BÁO: Không nhận diện được cấu trúc web này. Dưới đây là toàn bộ chữ quét được:\n\n" + bodyText.replace(/\n\s*\n/g, '\n\n');
            }
        }

        function getDomainStr(url) {
            try { return new URL(url).hostname.replace('www.', '').split('.')[0]; } 
            catch (e) { return 'chat'; }
        }

        async function downloadZip() {
            if (extractedChats.length === 0) return;
            const zip = new JSZip();
            extractedChats.forEach(chat => zip.file(chat.filename, chat.content));
            try {
                const content = await zip.generateAsync({type: "blob"});
                triggerDownload(content, `LichSuChatAI_${new Date().getTime()}.zip`);
            } catch (err) {
                alert("Lỗi tạo file ZIP: " + err);
            }
        }

        function downloadIndividualFiles() {
            if (extractedChats.length === 0) return;
            let delay = 0;
            extractedChats.forEach(chat => {
                setTimeout(() => {
                    const blob = new Blob([chat.content], { type: 'text/plain;charset=utf-8' });
                    triggerDownload(blob, chat.filename);
                }, delay);
                delay += 300; 
            });
        }

        function triggerDownload(blob, filename) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { window.URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
        }
    </script>
</body>
</html>
